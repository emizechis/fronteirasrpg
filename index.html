<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRONTEIRAS — RPG de Mesa</title>
<style>
  :root {
    --primary-dark: #1b2033;
    --primary-light: #f2e9d8;
    --accent-gold: #e8c873;
    --accent-teal: #6fd9c4;
    --text-dark: #2a231c;
    --text-secondary: #5c5346;
    --border-gold: #a8781f;
    --bg-light: #ece0cf;
    --shadow-deep: 0 2px 0 #6b4a12;
    
    --font-serif: 'Crimson Text', serif;
    --font-sans-bold: 'Oswald SemiBold', 'Oswald', sans-serif;
    --font-display: 'Cinzel Black', 'Cinzel', serif;
    
    --spacing-xs: 4px;
    --spacing-sm: 8px;
    --spacing-md: 14px;
    --spacing-lg: 22px;
    --spacing-xl: 34px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  html, body {
    background: var(--primary-light);
    color: var(--text-dark);
    font-family: var(--font-serif);
    font-size: 11pt;
    line-height: 1.5;
  }

  p {
    orphans: 3;
    widows: 3;
    margin: 0 0 var(--spacing-sm) 0;
    text-align: justify;
  }

  h1, h2, h3 {
    break-after: avoid-page;
    font-family: var(--font-display);
    color: var(--primary-dark);
  }

  strong {
    color: var(--primary-dark);
  }

  em {
    color: var(--text-secondary);
  }

  table.stat,
  .box,
  .origem-card {
    break-inside: avoid-page;
  }

  /* ===== Paginação ===== */
  @page {
    size: A4;
    margin: 20mm 18mm 24mm 18mm;
    @bottom-center {
      content: "FRONTEIRAS  •  " counter(page) " / " counter(pages);
      font-family: var(--font-sans-bold);
      font-size: 8pt;
      color: #8a7248;
      letter-spacing: 1.5pt;
    }
  }

  @page cover {
    margin: 0;
  }

  /* ===== CAPA ===== */
  .cover {
    page: cover;
    position: relative;
    width: 210mm;
    height: 297mm;
    background: var(--primary-dark);
    page-break-after: always;
    overflow: hidden;
    padding: 40px;
  }

  .cover-frame {
    position: absolute;
    top: 50px;
    left: 50px;
    right: 50px;
    bottom: 50px;
    border: 2px solid var(--border-gold);
  }

  .cover-frame::before {
    content: "";
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    bottom: 8px;
    border: 1px solid var(--accent-teal);
  }

  .cover-hexrow {
    text-align: center;
    margin-top: 150px;
  }

  .cover-hexrow span {
    display: inline-block;
    width: 10px;
    height: 10px;
    margin: 0 6px;
    background: var(--border-gold);
    transform: rotate(45deg);
  }

  .cover-kicker {
    text-align: center;
    color: var(--accent-teal);
    font-family: var(--font-sans-bold);
    letter-spacing: 8px;
    font-size: 11pt;
    margin-top: var(--spacing-lg);
    text-transform: uppercase;
  }

  .cover-title {
    text-align: center;
    color: var(--accent-gold);
    font-size: 76pt;
    letter-spacing: 6px;
    margin-top: 18px;
    text-shadow: var(--shadow-deep);
  }

  .cover-subtitle {
    text-align: center;
    color: var(--primary-light);
    font-family: var(--font-sans-bold);
    font-size: 15pt;
    letter-spacing: 2px;
    margin-top: 14px;
  }

  .cover-divider {
    width: 220px;
    height: 2px;
    background: var(--border-gold);
    margin: var(--spacing-xl) auto;
    position: relative;
  }

  .cover-divider::before {
    content: "•";
    position: absolute;
    top: -11px;
    left: 50%;
    margin-left: -6px;
    color: var(--accent-teal);
    font-size: 20pt;
    background: var(--primary-dark);
    padding: 0 6px;
  }

  .cover-tagline {
    text-align: center;
    color: #c9bc9c;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 13pt;
    max-width: 520px;
    margin: 0 auto;
  }

  .cover-footer {
    position: absolute;
    bottom: 70px;
    left: 0;
    right: 0;
    text-align: center;
    color: #7a8199;
    font-family: var(--font-sans-bold);
    font-size: 9pt;
    letter-spacing: 2px;
  }

  /* ===== SUMÁRIO ===== */
  .toc-page {
    page-break-after: always;
    padding-top: 10px;
  }

  .toc-title {
    font-size: 26pt;
    letter-spacing: 3px;
    border-bottom: 3px solid var(--border-gold);
    padding-bottom: 10px;
    margin-bottom: var(--spacing-lg);
  }

  table.toc {
    width: 100%;
    border-collapse: collapse;
  }

  table.toc td {
    padding: 7px 4px;
    font-family: var(--font-sans-bold);
    font-size: 11pt;
    border-bottom: 1px dotted #a8926a;
    color: var(--text-dark);
  }

  table.toc td.tocnum {
    width: 34px;
    color: var(--border-gold);
    font-family: var(--font-sans-bold);
  }

  table.toc td.tocpage {
    width: 34px;
    text-align: right;
    color: #1f7a6c;
    font-family: var(--font-sans-bold);
  }

  /* ===== CAPÍTULOS ===== */
  .chapter-band {
    page-break-before: always;
    background: var(--primary-dark);
    margin: 0 -2px var(--spacing-lg) -2px;
    padding: var(--spacing-lg) var(--spacing-md);
    position: relative;
  }

  .chapter-band .chnum {
    color: var(--accent-teal);
    font-family: var(--font-sans-bold);
    letter-spacing: 5px;
    font-size: 10.5pt;
    text-transform: uppercase;
  }

  .chapter-band h1 {
    color: var(--accent-gold);
    font-size: 29pt;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .chapter-band .chsub {
    color: #c9bc9c;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 11.5pt;
    margin-top: 6px;
  }

  .intro-band {
    background: var(--primary-dark);
    padding: var(--spacing-lg) var(--spacing-md);
    margin: 0 -2px var(--spacing-lg) -2px;
  }

  .intro-band h1 {
    color: var(--accent-gold);
    font-size: 26pt;
    letter-spacing: 2px;
  }

  h2.section {
    font-size: 16pt;
    color: var(--primary-dark);
    letter-spacing: 0.5px;
    margin: var(--spacing-lg) 0 var(--spacing-sm) 0;
    border-bottom: 2px solid var(--border-gold);
    padding-bottom: 4px;
  }

  h2.section .num {
    color: var(--border-gold);
    margin-right: 6px;
  }

  h3.subsection {
    font-size: 12.5pt;
    color: #1f7a6c;
    letter-spacing: 0.5px;
    margin: 14px 0 6px 0;
    font-family: var(--font-sans-bold);
    text-transform: uppercase;
  }

  /* ===== LISTAS ===== */
  ul.list {
    list-style: none;
    padding-left: 4px;
    margin: 6px 0 12px 0;
  }

  ul.list li {
    padding-left: 16px;
    position: relative;
    margin-bottom: 5px;
    text-align: justify;
  }

  ul.list li::before {
    content: "▶";
    color: var(--border-gold);
    position: absolute;
    left: 0;
    top: 0;
  }

  .cols2 {
    -webkit-column-count: 2;
    column-count: 2;
    -webkit-column-gap: 26px;
    column-gap: 26px;
  }

  /* ===== TABELAS ===== */
  table.stat {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0 16px 0;
  }

  table.stat th {
    background: var(--primary-dark);
    color: var(--accent-gold);
    font-family: var(--font-sans-bold);
    font-size: 9.5pt;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 6px 8px;
    text-align: left;
  }

  table.stat td {
    padding: 5px 8px;
    font-size: 10pt;
    border-bottom: 1px solid #d9cba3;
  }

  table.stat tr:nth-child(even) td {
    background: #e9decb;
  }

  /* ===== CAIXAS ===== */
  .box {
    border-left: 5px solid var(--border-gold);
    background: #ece0bf;
    padding: var(--spacing-md) 14px;
    margin: 12px 0;
  }

  .box-title {
    font-family: var(--font-sans-bold);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 10.5pt;
    color: #7a5a12;
    margin-bottom: 4px;
  }

  .box-teal {
    border-left-color: #1f7a6c;
    background: #d9ece6;
  }

  .box-teal .box-title {
    color: #155a50;
  }

  .box-purple {
    border-left-color: #6b4a94;
    background: #e6dcf0;
  }

  .box-purple .box-title {
    color: #523873;
  }

  .box-red {
    border-left-color: #9c3f34;
    background: #f0dcd7;
  }

  .box-red .box-title {
    color: #7a2f26;
  }

  /* ===== CARDS DE ORIGEM ===== */
  .origem-card {
    border: 1px solid #a8926a;
    background: #eee4cd;
    margin: 14px 0;
  }

  .origem-head {
    background: var(--primary-dark);
    color: var(--accent-gold);
    padding: 8px 14px;
    font-family: 'Cinzel Bold', 'Cinzel', serif;
    font-size: 14pt;
    letter-spacing: 1px;
  }

  .origem-body {
    padding: var(--spacing-md) 14px;
  }

  .origem-row {
    margin-bottom: 6px;
  }

  .origem-row .lbl {
    font-family: var(--font-sans-bold);
    text-transform: uppercase;
    font-size: 9pt;
    letter-spacing: 0.5px;
    color: #1f7a6c;
    display: block;
    margin-bottom: 1px;
  }

  /* ===== DIVISORES ===== */
  .rule-deco {
    text-align: center;
    margin: 18px 0;
    color: var(--border-gold);
    letter-spacing: 14px;
    font-size: 11pt;
  }

  /* ===== FICHA ===== */
  .sheet-block {
    border: 1.5px solid var(--text-dark);
    padding: 8px 10px;
    margin-bottom: 10px;
  }

  .sheet-label {
    font-family: var(--font-sans-bold);
    font-size: 8.5pt;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    display: block;
  }

  table.sheet-grid {
    width: 100%;
    border-collapse: collapse;
  }

  table.sheet-grid td {
    border: 1.5px solid var(--text-dark);
    padding: 6px;
    vertical-align: top;
    width: 20%;
  }

  .attr-box {
    text-align: center;
  }

  .attr-name {
    font-family: var(--font-sans-bold);
    font-size: 9pt;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .attr-num {
    border: 1px solid var(--text-dark);
    border-radius: 4px;
    width: 44px;
    height: 36px;
    margin: 6px auto 0 auto;
  }

  .pip-row {
    margin-top: 4px;
  }

  .pip {
    display: inline-block;
    width: 13px;
    height: 13px;
    border: 1.5px solid var(--text-dark);
    border-radius: 50%;
    margin-right: 4px;
  }

  .fillbox {
    border-bottom: 1px solid var(--text-secondary);
    min-height: 16px;
    margin-bottom: 3px;
  }

  .skill-line {
    display: table;
    width: 100%;
    padding: 2px 0;
    border-bottom: 1px dotted #a8926a;
  }

  .skill-line .sn {
    display: table-cell;
    font-size: 9.5pt;
  }

  .skill-line .sp {
    display: table-cell;
    text-align: right;
    width: 90px;
  }

  .final-note {
    text-align: center;
    padding-top: 120px;
  }

  .final-note .fn-title {
    font-size: 20pt;
    letter-spacing: 3px;
  }

  .final-note p {
    text-align: center;
    max-width: 480px;
    margin: 10px auto;
    color: var(--text-secondary);
    font-size: 10pt;
  }
</style>
</head>
<body>
  <!-- resto do HTML aqui, sem alterações -->
</body>
</html>
